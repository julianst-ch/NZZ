<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZZ News Stories - Full HD 9:16</title>
    <style>
        :root {
            --bg-color: #030914;
            --text-color: #ffffff;
            --text-muted: #a0aab8;
            --accent-blue: #1d9bf0;
            --story-duration: 7000ms;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Strict 9:16 Canvas optimized for Full HD and scaled displays */
        .story-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: calc(100vh * 9 / 16);
            max-height: calc(100vw * 16 / 9);
            aspect-ratio: 9 / 16;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.85);
        }

        /* Top Progress Bars */
        .progress-container {
            position: absolute;
            top: 2vh;
            left: 0;
            right: 0;
            display: flex;
            padding: 0 4%;
            gap: 6px;
            z-index: 10;
        }

        .progress-bar {
            height: 3px;
            flex: 1;
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #fff;
        }

        /* Top Header Metadata */
        .story-header {
            position: absolute;
            top: 4vh;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .meta-info {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .category {
            color: #fff;
        }

        .time-ago {
            color: var(--text-muted);
            margin-left: 8px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            line-height: 1;
        }

        /* Navigation Taps Layer */
        .nav-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
        }

        .zone-left {
            width: 33%;
            height: 100%;
        }

        .zone-right {
            width: 67%;
            height: 100%;
        }

        /* Main Slides Canvas */
        .slides-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Visual Imagery Layer */
        .image-container {
            width: 100%;
            height: 58%;
            position: relative;
            background-color: #000;
        }

        .story-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Ambient background dark fade matrix */
        .image-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to bottom, transparent, var(--bg-color));
        }

        /* Text Presentation Matrix */
        .content-container {
            flex: 1;
            padding: 4% 6% 8% 6%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background-color: var(--bg-color);
        }

        .ticker-badge {
            align-self: flex-start;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--accent-blue);
            margin-bottom: 3%;
        }

        .story-title {
            font-family: Georgia, serif;
            font-size: 1.95rem;
            line-height: 1.35;
            font-weight: 600;
            margin-bottom: 4%;
            color: var(--text-color);
        }

        .story-description {
            font-size: 1.15rem;
            line-height: 1.65;
            color: var(--text-muted);
        }

        .story-author {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: auto;
            padding-top: 15px;
        }

        /* Loading Spinner */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: var(--text-muted);
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="story-wrapper">
        <div class="loader" id="loader">Lade Nachrichten...</div>
        
        <!-- Overhead Display Framework -->
        <div class="progress-container" id="progressContainer"></div>
        <div class="story-header" id="storyHeader" style="display: none;">
            <div class="meta-info">
                <span class="category" id="headerCategory">NZZ</span>
                <span class="time-ago" id="headerTime">Jetzt</span>
            </div>
            <button class="close-btn">&times;</button>
        </div>

        <!-- Direct Input Triggers -->
        <div class="nav-zones">
            <div class="zone-left" id="zoneLeft"></div>
            <div class="zone-right" id="zoneRight"></div>
        </div>

        <!-- Render Target Frame Container -->
        <div class="slides-container" id="slidesContainer"></div>
    </div>

    <script>
        const RSS_URL = 'https://www.nzz.ch/recent.rss';
        const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(RSS_URL)}`;
        const STORY_DURATION = 7000;

        let stories = [];
        let currentIndex = 0;
        let startTime = null;
        let animationFrameId = null;

        async function fetchFeed() {
            try {
                const response = await fetch(PROXY_URL);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                stories = Array.from(items).slice(0, 15).map(item => {
                    const title = item.querySelector('title')?.textContent || '';
                    const rawDescription = item.querySelector('description')?.textContent || '';
                    const pubDate = item.querySelector('pubDate')?.textContent || '';
                    const category = item.querySelector('category')?.textContent || 'International';
                    const creator = item.getElementsByTagName('dc:creator')[0]?.textContent || '';

                    // High efficiency NZZ image parsing routine
                    let imageUrl = '';
                    const enclosure = item.querySelector('enclosure');
                    if (enclosure && enclosure.getAttribute('type')?.includes('image')) {
                        imageUrl = enclosure.getAttribute('url');
                    }
                    
                    if (!imageUrl) {
                        const mediaContent = item.getElementsByTagName('media:content')[0];
                        if (mediaContent) imageUrl = mediaContent.getAttribute('url');
                    }

                    if (!imageUrl) {
                        const imgMatch = rawDescription.match(/<img[^>]+src="([^">]+)"/);
                        if (imgMatch && imgMatch[1]) imageUrl = imgMatch[1];
                    }

                    if (!imageUrl) {
                        imageUrl = 'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=800';
                    }

                    // Content node sanitizer
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = rawDescription;
                    const embeddedImg = tempDiv.querySelector('img');
                    if (embeddedImg) embeddedImg.remove();
                    const cleanDescription = tempDiv.textContent || tempDiv.innerText || '';

                    return { 
                        title, 
                        description: cleanDescription.trim(), 
                        imageUrl, 
                        pubDate, 
                        category, 
                        creator 
                    };
                });

                if (stories.length === 0) throw new Error("No items parsed");
                
                initStories();
            } catch (error) {
                console.error("Feed error:", error);
                document.getElementById('loader').innerText = "Fehler beim Laden des Feeds.";
            }
        }

        function initStories() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('storyHeader').style.display = 'flex';

            const progressContainer = document.getElementById('progressContainer');
            const slidesContainer = document.getElementById('slidesContainer');

            stories.forEach((story, idx) => {
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${idx}"></div>`;
                progressContainer.appendChild(bar);

                const slide = document.createElement('div');
                slide.className = `slide ${idx === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <div class="image-container">
                        <img class="story-img" src="${story.imageUrl}" alt="News Image">
                    </div>
                    <div class="content-container">
                        ${story.title.toLowerCase().includes('live') || story.title.toLowerCase().includes('ticker') ? '<div class="ticker-badge">LIVE-TICKER</div>' : ''}
                        <h1 class="story-title">${story.title}</h1>
                        <p class="story-description">${story.description}</p>
                        ${story.creator ? `<p class="story-author">${story.creator}</p>` : ''}
                    </div>
                `;
                slidesContainer.appendChild(slide);
            });

            showStory(0);
        }

        function showStory(index) {
            if (index < 0 || index >= stories.length) return;
            
            cancelAnimationFrame(animationFrameId);

            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, idx) => {
                slide.classList.toggle('active', idx === index);
            });

            currentIndex = index;
            const story = stories[currentIndex];

            document.getElementById('headerCategory').innerText = story.category;
            document.getElementById('headerTime').innerText = formatRelativeTime(story.pubDate);
            
            const bars = document.querySelectorAll('.progress-bar');
            bars.forEach((bar, idx) => {
                const fill = bar.querySelector('.progress-fill');
                if (idx < index) {
                    fill.style.width = '100%';
                } else if (idx > index) {
                    fill.style.width = '0%';
                }
            });

            startTime = performance.now();
            animateProgress();
        }

        function animateProgress() {
            const activeFill = document.getElementById(`fill-${currentIndex}`);
            if (!activeFill) return;

            const elapsed = performance.now() - startTime;
            const progress = Math.min((elapsed / STORY_DURATION) * 100, 100);
            activeFill.style.width = `${progress}%`;

            if (progress < 100) {
                animationFrameId = requestAnimationFrame(animateProgress);
            } else {
                nextStory();
            }
        }

        function nextStory() {
            if (currentIndex < stories.length - 1) {
                showStory(currentIndex + 1);
            } else {
                showStory(0);
            }
        }

        function prevStory() {
            if (currentIndex > 0) {
                showStory(currentIndex - 1);
            } else {
                showStory(0);
            }
        }

        function formatRelativeTime(dateStr) {
            try {
                const parsedDate = new Date(dateStr);
                const diffMs = new Date() - parsedDate;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);

                if (diffMins < 60) return `${Math.max(1, diffMins)}m`;
                if (diffHours < 24) return `${diffHours}h`;
                return parsedDate.toLocaleDateString('de-CH', { day: 'numeric', month: 'short' });
            } catch (e) {
                return 'Jetzt';
            }
        }

        document.getElementById('zoneLeft').addEventListener('click', prevStory);
        document.getElementById('zoneRight').addEventListener('click', nextStory);

        fetchFeed();
    </script>
</body>
</html>
