<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZZ News Feed</title>
    <style>
        :root {
            --bg-color: #050b14;
            --card-bg: #0a1120;
            --text-main: #ffffff;
            --text-muted: #8a96a8;
            --accent-blue: #1d4ed8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #feed-container {
            width: 100%;
            max-width: 4500px;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .story-card {
            height: 100vh;
            width: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            scroll-snap-align: start;
            position: relative;
            border-bottom: 1px solid #111827;
        }
        .top-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .category {
            font-weight: 600;
            font-size: 14px;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .main-content {
            margin-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .title {
            font-family: Georgia, serif;
            font-size: 26px;
            line-height: 1.3;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .description {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .author {
            font-size: 14px;
            color: var(--text-muted);
            font-style: italic;
        }
        .bottom-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }
        .read-btn {
            background-color: #1e293b;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #334155;
            transition: background 0.2s;
        }
        .read-btn:active { background-color: #334155; }
        .bookmark-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 2;
        }
    </style>
</head>
<body>

<div id="feed-container">
    <!-- Dynamic items insert here -->
</div>

<script>
    async function loadFeed() {
        try {
            const response = await fetch('feed.xml');
            const text = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            const container = document.getElementById('feed-container');

            if(items.length === 0) {
                container.innerHTML = '<div style="padding:40px; text-align:center;">No articles found. Check feed.xml</div>';
                return;
            }

            items.forEach(item => {
                const title = item.querySelector("title")?.textContent || "";
                const link = item.querySelector("link")?.textContent || "#";
                const description = item.querySelector("description")?.textContent || "";
                const category = item.querySelector("category")?.textContent || "NZZ";
                const creator = item.querySelector("creator") || item.querySelector("author") || "";
                
                const card = document.createElement('div');
                card.className = 'story-card';
                card.innerHTML = `
                    <div class="top-meta">
                        <span class="category">${category}</span>
                    </div>
                    <div class="main-content">
                        <h1 class="title">${title}</h1>
                        <p class="description">${description.replace(/<[^>]*>/g, '').substring(0, 280)}...</p>
                        ${creator ? `<p class="author">${creator.textContent}</p>` : ''}
                    </div>
                    <div class="bottom-actions">
                        <a href="${link}" target="_blank" class="read-btn">Lesen</a>
                        <svg class="bookmark-icon" viewBox="0 0 24 24"><path d="M5 3v18l7-5 7 5V3H5z"/></svg>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error("Error parsing feed:", error);
        }
    }
    window.addEventListener('DOMContentLoaded', loadFeed);
</script>
</body>
</html>
